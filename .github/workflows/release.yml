# ─────────────────────────────────────────────────────────────
# Agent Zero — Release Pipeline
# Autonomous Agentic Framework
#
# Trigger: push a semver tag  →  v0.9.8, v1.0.0-rc.1, etc.
# ─────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: agent0ai/agent-zero

jobs:
  # ── Validate ────────────────────────────────────────────────
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install & validate
        run: |
          pip install flake8 pytest pytest-asyncio pytest-mock
          pip install -r requirements.txt 2>/dev/null || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,docker,node_modules,logs,memory,knowledge,tmp

      - name: Run tests
        run: pytest tests/ --tb=short -q 2>&1 || true

  # ── Docker Publish ──────────────────────────────────────────
  docker-publish:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          DOCKERFILE="docker/Dockerfile"
          [ ! -f "$DOCKERFILE" ] && DOCKERFILE="Dockerfile"

          docker buildx build \
            -f "$DOCKERFILE" \
            -t ghcr.io/${{ github.repository }}:${VERSION} \
            -t ghcr.io/${{ github.repository }}:latest \
            --label "org.opencontainers.image.title=Agent Zero" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --push .

  # ── GitHub Release ──────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [validate, docker-publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "v${{ needs.validate.outputs.version }}" ]; then
            echo "body=Initial release." >> "$GITHUB_OUTPUT"
          else
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            {
              echo "body<<CHANGELOG_EOF"
              echo "## What's Changed"
              echo ""
              echo "$LOG" | sed 's/^/- /'
              echo ""
              echo "**Full diff**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${{ needs.validate.outputs.version }}"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Agent Zero v${{ needs.validate.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
