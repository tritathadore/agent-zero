# ─────────────────────────────────────────────────────────────
# Agent Zero — GitLab CI/CD
# Autonomous Agentic Framework
# ─────────────────────────────────────────────────────────────

image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DOCKER_IMAGE: agent0ai/agent-zero

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .pip-cache/
    - .venv/

stages:
  - prepare
  - quality
  - test
  - build
  - release

# ── Prepare ─────────────────────────────────────────────────
setup:
  stage: prepare
  script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install flake8 pytest pytest-cov pytest-asyncio pytest-mock bandit safety
    - pip install -r requirements.txt 2>/dev/null || pip install --no-deps -r requirements.txt || true
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

# ── Quality Gate ────────────────────────────────────────────
lint:
  stage: quality
  needs: [setup]
  script:
    - source .venv/bin/activate
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        --exclude=.venv,docker,node_modules,logs,memory,knowledge,tmp
    - flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
        --exclude=.venv,docker,node_modules,logs,memory,knowledge,tmp

security-scan:
  stage: quality
  needs: [setup]
  script:
    - source .venv/bin/activate
    - bandit -r python/ -f json -o bandit-report.json --exit-zero || true
    - safety check -r requirements.txt --output json > safety-report.json || true
  artifacts:
    paths:
      - bandit-report.json
      - safety-report.json
    expire_in: 30 days
    when: always
  allow_failure: true

# ── Test ────────────────────────────────────────────────────
test:
  stage: test
  needs: [lint]
  script:
    - source .venv/bin/activate
    - pytest tests/ --tb=short --cov=python/ --cov-report=xml
        --cov-report=term-missing -q --no-header
        --junitxml=test-results.xml 2>&1 || true
  artifacts:
    reports:
      junit: test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 14 days
    when: always

# ── Docker Build ────────────────────────────────────────────
docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs: [test]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - |
      if [ -f docker/Dockerfile ]; then
        docker build -f docker/Dockerfile -t ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} .
      elif [ -f Dockerfile ]; then
        docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} .
      else
        echo "No Dockerfile found — skipping."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Release — Pre-release & Stable ─────────────────────────
publish-prerelease:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  needs: [docker-build]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      if [ -f docker/Dockerfile ]; then
        docker build -f docker/Dockerfile -t ${CI_REGISTRY_IMAGE}:${VERSION} .
      else
        docker build -t ${CI_REGISTRY_IMAGE}:${VERSION} .
      fi
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - docker push ${CI_REGISTRY_IMAGE}:${VERSION}
    - echo "Pre-release ${VERSION} published."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-.+$/

publish-stable:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  needs: [docker-build]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      if [ -f docker/Dockerfile ]; then
        docker build -f docker/Dockerfile \
          -t ${CI_REGISTRY_IMAGE}:${VERSION} \
          -t ${CI_REGISTRY_IMAGE}:latest .
      else
        docker build \
          -t ${CI_REGISTRY_IMAGE}:${VERSION} \
          -t ${CI_REGISTRY_IMAGE}:latest .
      fi
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - docker push ${CI_REGISTRY_IMAGE}:${VERSION}
    - docker push ${CI_REGISTRY_IMAGE}:latest
    - echo "Stable release ${VERSION} published."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
